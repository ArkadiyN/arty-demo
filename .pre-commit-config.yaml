repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        language: system
        entry: uv run ruff check --fix
        types: [python]

      - id: ty
        name: ty
        language: system
        entry: uvx ty check --python .venv
        pass_filenames: false
        types: [python]

      - id: mdformat
        name: mdformat
        language: system
        entry: uv run mdformat --extensions gfm --extensions frontmatter
        types: [markdown]
        # These paths embed LaTeX math (subscripts, \cdot, etc.) that mdformat
        # corrupts (escapes underscores, doubles backslashes) — same class of
        # bug already worked around for .qmd via .mdformat-ignore, but that
        # file only applies to mdformat's own directory-mode discovery, not
        # to files pre-commit passes explicitly, hence the exclude here too.
        exclude: '\.claude/agent-memory/|experiment/.*/updates/.*\.md$|openspec/specs/.*\.md$'

      - id: detect-secrets
        name: detect-secrets
        language: system
        entry: uv run detect-secrets-hook --baseline .secrets.baseline
        exclude: '(\.venv|\.ruff_cache|\.pytest_cache|uv\.lock)(/|$)'
        pass_filenames: true
